# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/staypoint_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format-sql=true

# Server Configuration (Render/Railway inject PORT; fall back to SERVER_PORT then 1004)
server.port=${PORT:${SERVER_PORT:1004}}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Auth — Clerk session JWTs validated as an OAuth2 resource server (issuer exposes JWKS)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URL:}

# Cloudinary (image uploads)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:staypoint/pgs}
